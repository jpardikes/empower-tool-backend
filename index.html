<!--
  Empower AI Field Engineer — Stage 1 (v0.2)
  Data Collection + Recommendation Tool
  Adds: per-system support (multi-zone homes) + AI photo extraction of nameplate data.
  Single self-contained file. Mobile-first. Auto-saves.
-->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap');
  :root{
    --bg:#e6e3da; --paper:#faf9f5; --ink:#16160f; --muted:#6f6c61; --line:#d2cec2; --line-strong:#b6b1a2;
    --accent:#d6451f; --accent-dk:#a8330f; --cool:#1c66c9; --cool-dk:#0f4894;
    --good:#3a7d44; --warn:#c0810f; --chrome:#16160f; --radius:4px;
    --shadow:0 1px 0 var(--line-strong), 0 8px 24px -16px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{background:var(--bg);color:var(--ink);font-family:'IBM Plex Sans',sans-serif;}
  body{min-height:100vh;background-image:
    repeating-linear-gradient(0deg, transparent 0 39px, rgba(0,0,0,.018) 39px 40px),

  .mono{font-family:'IBM Plex Mono',monospace;}
  .app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
  header{position:sticky;top:0;z-index:30;background:var(--chrome);color:#f3f1e8;
    padding:calc(env(safe-area-inset-top) + 10px) 16px 10px;display:flex;align-items:center;gap:10px;border-bottom:2px solid var(--accent);}
  header .badge{width:30px;height:30px;border:1.5px solid var(--accent);border-radius:3px;display:grid;place-items:center;
    font-family:'Archivo';font-weight:900;font-size:15px;color:var(--accent);flex:0 0 auto;}
  header .ttl{font-family:'Archivo';font-weight:800;letter-spacing:.04em;font-size:13px;line-height:1.1;text-transform:uppercase;}
  header .sub{font-size:9.5px;color:#9b988c;letter-spacing:.22em;text-transform:uppercase;}
  header .right{margin-left:auto;font-size:9.5px;letter-spacing:.18em;color:#807d72;text-transform:uppercase;}
  main{flex:1;padding:16px 16px 120px;}
  .btn{appearance:none;border:none;cursor:pointer;font-family:'Archivo';font-weight:700;letter-spacing:.03em;font-size:14px;
    padding:15px 18px;border-radius:var(--radius);background:var(--ink);color:#faf9f5;width:100%;text-transform:uppercase;
    transition:transform .08s ease, filter .15s ease;}
  .btn:active{transform:translateY(1px) scale(.997);}
  .btn.accent{background:var(--accent);} .btn.cool{background:var(--cool);}
  .btn.ghost{background:transparent;color:var(--ink);border:1.5px solid var(--line-strong);}
  .btn.sm{width:auto;font-size:12px;padding:10px 14px;} .btn:disabled{opacity:.4;cursor:not-allowed;}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);}
  .hero{padding:6px 2px 18px;}
  .hero h1{font-family:'Archivo';font-weight:900;font-size:30px;line-height:.98;letter-spacing:-.01em;}
  .hero p{color:var(--muted);font-size:13px;margin-top:8px;max-width:40ch;}
  .kicker{font-family:'IBM Plex Mono';font-size:10px;letter-spacing:.28em;color:var(--accent);text-transform:uppercase;margin-bottom:6px;}
  .surveys{margin-top:20px;display:flex;flex-direction:column;gap:10px;}
  .slist-h{display:flex;align-items:baseline;justify-content:space-between;margin:4px 2px 2px;}
  .slist-h span{font-family:'Archivo';font-weight:800;font-size:12px;letter-spacing:.14em;text-transform:uppercase;}
  .slist-h em{font-style:normal;color:var(--muted);font-size:11px;}
  .srow{display:flex;align-items:center;gap:12px;padding:13px 14px;cursor:pointer;}
  .srow:active{filter:brightness(.985);}
  .srow .dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;}
  .srow .nm{font-weight:600;font-size:14px;} .srow .meta{font-size:11px;color:var(--muted);margin-top:2px;}
  .srow .chev{margin-left:auto;color:var(--line-strong);font-size:20px;}

  .field .hint{color:var(--muted);font-weight:400;font-size:11px;} .req{color:var(--accent);}
  input[type=text],input[type=tel],input[type=number],textarea,select{width:100%;font-family:'IBM Plex Sans';font-size:16px;color:var(--ink);

  /* systems */

  .addsys{width:100%;padding:14px;border:1.5px dashed var(--line-strong);border-radius:var(--radius);background:transparent;
    font-family:'Archivo';font-weight:700;letter-spacing:.05em;text-transform:uppercase;font-size:13px;color:var(--ink);cursor:pointer;}

  .ai-panel .reason b{color:var(--ink);}
  .rb{border:1px solid var(--line);border-left:4px solid var(--cool);border-radius:var(--radius);background:var(--paper);padding:11px 13px;margin-bottom:8px;}
  .rb-h{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
  .rb-lv{font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:2px 7px;border-radius:10px;background:var(--muted);color:#fff;font-weight:700;}
  .rb-lv.federal{background:#3a5a8a;} .rb-lv.state{background:var(--cool);} .rb-lv.utility{background:var(--good);} .rb-lv.local{background:var(--warn);}
  .rb-amt{margin-left:auto;font-family:'IBM Plex Mono';font-weight:600;font-size:13px;color:var(--accent-dk);}
  .rb-name{font-weight:700;font-size:13px;} .rb-d{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.4;}
  .rb-link{display:inline-block;margin-top:6px;font-size:11.5px;font-weight:700;color:var(--cool-dk);text-decoration:none;letter-spacing:.03em;}
  .spinner{width:16px;height:16px;border:2px solid rgba(28,102,201,.3);border-top-color:var(--cool);border-radius:50%;animation:spin .8s linear infinite;display:inline-block;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .iconbtn{background:none;border:none;color:inherit;cursor:pointer;font-family:'Archivo';font-weight:700;font-size:12px;letter-spacing:.1em;text-transform:uppercase;padding:6px;}

  /* mode select */
  .mode-hero{padding:30px 4px 18px;text-align:center;}
  .mode-hero .badge2{width:54px;height:54px;border:2px solid var(--accent);border-radius:7px;display:grid;place-items:center;font-family:'Archivo';font-weight:900;font-size:24px;color:var(--accent);margin:0 auto 18px;}
  .mode-hero h1{font-family:'Archivo';font-weight:900;font-size:30px;line-height:1;}
  .mode-hero p{color:var(--muted);font-size:13px;margin-top:8px;}
  .mode-card{display:flex;align-items:center;gap:14px;padding:20px 18px;cursor:pointer;margin-bottom:12px;transition:transform .08s;}
  .mode-card:active{transform:scale(.99);}
  .mode-card .ic{width:46px;height:46px;border-radius:8px;display:grid;place-items:center;font-size:22px;flex:0 0 auto;color:#fff;font-family:'Archivo';font-weight:900;}
  .mode-card .ic.t{background:var(--cool);} .mode-card .ic.s{background:var(--accent);}
  .mode-card h3{font-family:'Archivo';font-weight:800;font-size:17px;}
  .mode-card .sub{font-size:12px;color:var(--muted);margin-top:2px;}
  .mode-card .cv{margin-left:auto;color:var(--line-strong);font-size:22px;}
  .switcher{text-align:center;margin-top:6px;}

  /* tech */
  .who{background:var(--chrome);color:#f3f1e8;border-radius:6px;padding:11px 13px;display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .who .av{width:34px;height:34px;border-radius:50%;background:var(--cool);display:grid;place-items:center;font-family:'Archivo';font-weight:800;font-size:13px;flex:0 0 auto;}
  .who .nm{font-weight:700;font-size:13px;} .who .lv{font-size:10px;color:#9b988c;letter-spacing:.08em;text-transform:uppercase;}
  .who .ed{margin-left:auto;font-family:'Archivo';font-weight:700;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--cool);cursor:pointer;}
  .gatechips{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
  .gatechip{font-family:'IBM Plex Mono';font-size:9.5px;font-weight:600;padding:3px 8px;border-radius:10px;background:#2a2a20;color:#d6cfbc;letter-spacing:.04em;}
  .gatechip.on{background:var(--good);color:#fff;}
  .eqgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

  .comp{background:var(--paper);border:1px solid var(--line);border-left:4px solid var(--line-strong);border-radius:4px;padding:12px 13px;display:flex;align-items:center;gap:10px;margin-bottom:9px;cursor:pointer;}
  .comp.done{border-left-color:var(--good);} .comp .nm{font-weight:700;font-size:13px;} .comp .mt{font-size:10.5px;color:var(--muted);margin-top:2px;} .comp .cv{margin-left:auto;color:var(--line-strong);font-size:20px;}

<div class="app">
  <header>
    <div class="badge">FE</div>
    <div><div class="ttl">Field Engineer</div><div class="sub">Stage 1 · Survey + Rec</div></div>
    <div class="right" id="hdrRight">v0.2</div>
  </header>
  <main id="view"></main>
</div>
<div class="nav" id="nav" style="display:none;"><div class="inner" id="navInner"></div></div>
<div class="toast" id="toast"></div>

<script>
/* ============================== STORAGE ============================== */
// Uses the platform storage when available (Claude preview); otherwise localStorage (hosted site).
const store={
  async get(k){
    if(typeof window!=='undefined'&&window.storage){ try{ const r=await window.storage.get(k); return r&&r.value?r.value:null; }catch(e){} }
    try{ return localStorage.getItem(k); }catch(e){ return null; }
  },
  async set(k,v){
    if(typeof window!=='undefined'&&window.storage){ try{ await window.storage.set(k,v); return; }catch(e){} }
    try{ localStorage.setItem(k,v); }catch(e){}
  }
};
const STORE_KEY='fieldeng_surveys_v2';
const BACKEND_KEY='fieldeng_backend_url';
const BACKTOK_KEY='fieldeng_backend_token';
let backendURL='/api/lookup', backendToken='';
async function loadBackend(){
  const u=await store.get(BACKEND_KEY); if(u)backendURL=u;
  backendToken=(await store.get(BACKTOK_KEY))||'';
}
async function saveBackend(){
  const u=(document.getElementById('beInput')||{}).value||'';
  const t=(document.getElementById('beTok')||{}).value||'';
  backendURL=u.trim(); backendToken=t.trim();
  await store.set(BACKEND_KEY,backendURL); await store.set(BACKTOK_KEY,backendToken);
  toast(backendURL?'Backend saved':'Backend cleared'); setBeStatus(backendURL?'Saved. Tap Test to verify.':'Not set.');
}
async function testBackend(){
  setBeStatus('Testing…');
  try{ const r=await callBackend('ping',{});
    setBeStatus('Connected ✓   '+(r.has&&r.has.rentcast?'RentCast ✓':'RentCast ✗')+'   '+(r.has&&r.has.anthropic?'AI ✓':'AI ✗'));
  }catch(e){ setBeStatus('Failed: '+((e&&e.message)||e)); }
}
function setBeStatus(t){ const el=document.getElementById('beStatus'); if(el)el.textContent=t; }
let surveys=[]; let mem=false;
async function loadSurveys(){
  const r=await store.get(STORE_KEY); surveys=r?JSON.parse(r):[];
}
function stripForSave(s){
  // never persist large API images; keep small thumbs + extracted data only
  const c=JSON.parse(JSON.stringify(s, (k,v)=> (k==='_apiImages'?undefined:v)));
  return c;
}
async function saveSurveys(){
  await store.set(STORE_KEY, JSON.stringify(surveys.map(stripForSave)));
}

/* ============================== TRANSIENT (not persisted) ============================== */
let apiImages={};  // { systemId: [ {base64, mediaType} ] } — full-size for the API only

/* ============================== SCHEMA ============================== */
const SYS_TYPES=['Central AC','Gas Furnace','AC + Furnace','Heat Pump','Boiler','Package Unit','Mini-Split'];
const PROP_STEPS=[
  { id:'customer', title:'Customer & Property', fields:[
    {id:'name',label:'Customer name',type:'text',req:true},
    {id:'phone',label:'Phone',type:'tel'},
    {id:'address',label:'Street address',type:'text',req:true},
    {id:'city',label:'City',type:'text'},
    {id:'state',label:'State',type:'text',hint:'e.g. CO'},
    {id:'zip',label:'ZIP',type:'number'},
    {id:'sqft',label:'Total conditioned sq ft',type:'number',req:true,hint:'Whole home'},
    {id:'year',label:'Year built',type:'number',hint:'Affects load'},
    {id:'stories',label:'Stories',type:'chips',opts:['1','2','3+']},
    {id:'utility',label:'Power / utility provider',type:'text',hint:'Auto-fills from lookup, or enter'},
  ]},

function estCoolingTons(sqft,year){ sqft=parseFloat(sqft); if(!sqft||sqft<=0)return null; let t=sqft/500; const y=parseInt(year);
  if(y&&y<1980)t*=1.15; else if(y&&y>2010)t*=0.9; t=Math.round(t*2)/2; return Math.min(5,Math.max(1.5,t)); }
function estHeatingBTU(sqft){ sqft=parseFloat(sqft); if(!sqft||sqft<=0)return null; const r=n=>Math.round(n/1000)*1000; return {low:r(sqft*35),high:r(sqft*45)}; }
const TIERS={
  cooling:[
    {lvl:'Good',tag:'Standard',spec:'14.3 SEER2 · Single-stage AC',feats:['Meets current efficiency minimum','Reliable, lowest install cost','Best for short-term ownership']},
    {lvl:'Better',tag:'Two-Stage',spec:'16 SEER2 · Two-stage AC',feats:['Quieter, steadier temperatures','Better humidity control','Solid efficiency / value balance']},
    {lvl:'Best',tag:'Inverter',spec:'18+ SEER2 · Variable-speed inverter',feats:['Top efficiency & comfort','Excellent humidity + quiet operation','Often unlocks higher rebate tiers']},
  ],
  heating:[
    {lvl:'Good',tag:'80% AFUE',spec:'80% AFUE · Single-stage gas furnace',feats:['Lowest cost gas option','Simple, proven','Where venting limits condensing units']},
    {lvl:'Better',tag:'96% AFUE',spec:'96% AFUE · Single-stage condensing',feats:['Major fuel savings vs 80%','Common rebate qualifier','Strong value pick']},
    {lvl:'Best',tag:'Modulating',spec:'98% AFUE · Modulating + variable blower',feats:['Highest efficiency & comfort','Precise, quiet, even heat','Pairs well with zoning / IAQ']},
  ],
  heatpump:[
    {lvl:'Good',tag:'Standard HP',spec:'15 SEER2 / 8.1 HSPF2 · Single-stage',feats:['Electrified heat + cool in one','Entry rebate eligibility','Backup heat recommended']},
    {lvl:'Better',tag:'Two-Stage',spec:'17 SEER2 / 9 HSPF2 · Two-stage',feats:['Better cold-weather output','Improved comfort & efficiency','Strong rebate positioning']},
    {lvl:'Best',tag:'Cold-Climate',spec:'19+ SEER2 / 10+ HSPF2 · Variable inverter',feats:['Cold-climate rated performance','Highest rebates & savings','Premium comfort, low operating cost']},
  ],
};
function recSet(sys){ const t=sys.sysType||'';
  if(t==='Heat Pump'||t==='Mini-Split')return 'heatpump';
  if(t==='Gas Furnace'||t==='Boiler')return 'heating';
  if(t==='AC + Furnace'||t==='Package Unit')return 'combo';
  return 'cooling'; }
function sysEstimate(sys,d,count){
  const area=parseFloat(sys.area)||(count===1?parseFloat(d.sqft):null);
  return {area, cool:area?estCoolingTons(area,d.year):null, heat:area?estHeatingBTU(area):null};
}
function buildSystemFlags(sys,d,count){
  const f=[]; const age=parseInt(sys.eqYear);
  if(age&&age>=15)f.push({k:'risk',ic:'!',t:'End-of-life equipment ('+age+' yrs)',n:'Strong replacement justification — failure risk is high.'});
  else if(age&&age>=12)f.push({k:'risk',ic:'!',t:'Aging equipment ('+age+' yrs)',n:'Approaching end of service life.'});
  if(sys.condition==='Failed')f.push({k:'risk',ic:'!',t:'System has failed',n:'Replacement is immediate; emphasize speed of install.'});
  const set=recSet(sys);
  const gas=(sys.fuel==='Natural Gas'||sys.fuel==='Propane'||sys.fuel==='Oil');
  if(gas&&(sys.sysType==='Gas Furnace'||sys.sysType==='AC + Furnace'))
    f.push({k:'op',ic:'+',t:'Heat pump conversion candidate',n:'Worth a side-by-side option — may capture electrification rebates (Stage 3).'});
  const est=sysEstimate(sys,d,count); const existing=parseFloat(sys.tons);
  if(est.cool&&existing&&Math.abs(existing-est.cool)>=1)
    f.push({k:'risk',ic:'!',t:'Sizing mismatch flag',n:'Existing '+existing+' ton vs ~'+est.cool+' ton estimate. Confirm with a load calc.'});
  return {set,est,flags:f};
}
function buildPropertyFlags(d,systems){
  const f=[];
  const anyHP=systems.some(s=>recSet(s)==='heatpump');
  const smallPanel=(d.panel==='100A'||d.panel==='<100A');
  if(anyHP&&(smallPanel||d.panelSpace==='No'))f.push({k:'risk',ic:'!',t:'Electrical panel upgrade likely',n:'Heat pump load may exceed current panel capacity / spaces.'});
  if(d.duct==='Poor')f.push({k:'op',ic:'+',t:'Ductwork repair / replacement',n:'Poor ducts undercut new equipment — quote duct work.'});
  else if(d.duct==='Fair')f.push({k:'op',ic:'+',t:'Duct improvement opportunity',n:'Sealing / repair could lift comfort and efficiency.'});
  if(d.lineset==='Replace')f.push({k:'op',ic:'+',t:'Line set replacement',n:'Flag in scope — affects warranty / refrigerant compatibility.'});
  const comf=Array.isArray(d.comfort)?d.comfort:(d.comfort?[d.comfort]:[]);
  if(comf.includes('Dust / allergies')||comf.includes('Humidity'))f.push({k:'iaq',ic:'~',t:'Indoor air quality opportunity',n:'Filtration / humidity control fits the stated complaints.'});
  if(comf.includes('Hot/cold rooms')||comf.includes('Uneven floors'))f.push({k:'op',ic:'+',t:'Zoning / airflow opportunity',n:'Uneven temps suggest zoning or duct balancing.'});
  f.push({k:'iaq',ic:'~',t:'Maintenance agreement',n:'Attach a plan to protect the install and add recurring revenue.'});
  return f;
}

/* ============================== IMAGE + AI ============================== */
function resizeImage(file,maxDim,quality){
  return new Promise((resolve,reject)=>{
    const img=new Image(); const url=URL.createObjectURL(file);
    img.onload=()=>{ let w=img.width,h=img.height; const sc=Math.min(1,maxDim/Math.max(w,h));
      w=Math.round(w*sc); h=Math.round(h*sc);
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h); URL.revokeObjectURL(url);
      const durl=c.toDataURL('image/jpeg',quality);
      resolve({dataUrl:durl,base64:durl.split(',')[1],mediaType:'image/jpeg'});
    };
    img.onerror=reject; img.src=url;
  });
}
async function onPhotos(sysId,fileList){
  const sys=getSystem(sysId); if(!sys)return;
  const files=Array.from(fileList).slice(0,4);
  for(const file of files){
    if(!file.type.startsWith('image/'))continue;
    try{
      const thumb=await resizeImage(file,200,0.55);
      const big=await resizeImage(file,1100,0.7);
      sys.photos=sys.photos||[]; sys.photos.push(thumb.dataUrl);
      apiImages[sysId]=apiImages[sysId]||[]; apiImages[sysId].push({base64:big.base64,mediaType:big.mediaType});
    }catch(e){ toast('Photo error'); }
  }
  touch(); renderSystemEditor();
}
function removePhoto(sysId,i){
  const sys=getSystem(sysId); if(!sys)return;
  sys.photos.splice(i,1);
  if(apiImages[sysId]&&apiImages[sysId][i])apiImages[sysId].splice(i,1);
  touch(); renderSystemEditor();
}
const EXTRACT_PROMPT=`You are reading the data/nameplate label or serial sticker of an HVAC unit from one or more photos. Extract ONLY what is actually visible. Respond with a single JSON object and nothing else — no markdown, no code fences, no commentary. Use these keys:
{"brand":string|null,"model":string|null,"serial":string|null,"sysTypeGuess":one of ["Central AC","Gas Furnace","AC + Furnace","Heat Pump","Boiler","Package Unit","Mini-Split"] or null,"tonnageGuess":string|null,"fuelGuess":one of ["Natural Gas","Electric","Propane","Oil","None"] or null,"mfgYearGuess":number|null,"ageYearsGuess":number|null,"dateReasoning":string,"confidence":"high"|"medium"|"low","readNotes":string}
Important: serial-number date encoding differs by manufacturer and is often ambiguous. If you are not confident about the manufacture date, set mfgYearGuess and ageYearsGuess to null and explain why in dateReasoning. Never invent values you cannot read. The current year is `+NOW_YEAR+`.`;

async function runAI(sysId){
  const sys=getSystem(sysId); if(!sys)return;
  const imgs=apiImages[sysId]||[];
  if(!imgs.length){ toast('Add a photo first (this session)'); return; }
  sys._aiStatus='analyzing'; renderSystemEditor();
  try{
    const p=await callBackend('nameplate',{images:imgs.map(x=>({base64:x.base64,mediaType:x.mediaType}))});
    if(p.brand&&!sys.brand)sys.brand=p.brand;
    if(p.model&&!sys.model)sys.model=p.model;
    if(p.serial&&!sys.serial)sys.serial=p.serial;
    if(p.sysTypeGuess&&!sys.sysType&&SYS_TYPES.includes(p.sysTypeGuess))sys.sysType=p.sysTypeGuess;
    if(p.fuelGuess&&!sys.fuel)sys.fuel=p.fuelGuess;
    if(p.tonnageGuess&&!sys.tons){const tg=String(p.tonnageGuess).replace(/[^0-9.]/g,'');if(tg)sys.tons=tg;}
    if((p.ageYearsGuess||p.ageYearsGuess===0)&&!sys.eqYear)sys.eqYear=String(p.ageYearsGuess);
    else if(p.mfgYearGuess&&!sys.eqYear)sys.eqYear=String(Math.max(0,NOW_YEAR-p.mfgYearGuess));
    sys._ai=p; sys._aiStatus='done';
  }catch(e){ sys._aiStatus='error'; sys._aiError=String((e&&e.message)||e); }
  touch(); renderSystemEditor();
}

/* ============================== AI LOOKUPS (address → property + rebates) ============================== */
async function callBackend(action, payload){
  if(!backendURL) throw new Error('No backend set — open ⚙ Lookup Backend on the home screen and paste your URL.');
  const headers={'Content-Type':'application/json'};
  if(backendToken) headers['x-app-token']=backendToken;
  let res;
  try{ res=await fetch(backendURL,{method:'POST',headers,body:JSON.stringify(Object.assign({action},payload))}); }
  catch(err){ throw new Error('Could not reach backend: '+((err&&err.message)||err)); }
  const raw=await res.text();
  let data;
  try{ data=JSON.parse(raw); }catch(e){ throw new Error('Bad backend reply ('+res.status+'): '+raw.slice(0,120)); }
  if(!res.ok||data.error) throw new Error(data.error||('HTTP '+res.status));
  return data;
}
async function lookupProperty(){
  const d=current.data; const addr=fullAddress(d).trim();
  if(!addr){ toast('Enter the address first'); return; }
  d._propStatus='loading'; renderStep();
  try{
    const p=await callBackend('property',{address:addr});
    if(p.found===false){ d._propAI={confidence:'low',source:p.source||'',notes:p.notes||'No record found.'}; }
    else{
      if(p.sqft&&!d.sqft)d.sqft=String(p.sqft);
      if(p.yearBuilt&&!d.year)d.year=String(p.yearBuilt);
      if(p.stories&&!d.stories&&['1','2','3+'].includes(p.stories))d.stories=p.stories;
      if(p.utilityProvider&&!d.utility)d.utility=p.utilityProvider;
      d._propAI={confidence:p.confidence||'medium',source:p.source||'',notes:p.notes||''};
    }
    d._propStatus='done';
  }catch(e){ d._propStatus='error'; d._propErr=String((e&&e.message)||e); }
  touch(); renderStep();
}
function propPanelHTML(d){
  if(d._propStatus==='loading') return '<div class="ai-panel"><div class="ah"><span class="spinner"></span> Looking up property…</div></div>';
  if(d._propStatus==='error') return '<div class="ai-panel" style="border-color:var(--accent);background:#fdf2ef"><div class="ah" style="color:var(--accent-dk)">Lookup failed</div><div class="reason">Enter the details manually. ('+esc(d._propErr||'')+')</div></div>';

      (a.source?'<b>Source:</b> '+esc(a.source)+'<br>':'')+esc(a.notes||'Pre-filled where found. Confirm square footage before sizing.')+'</div></div>';

}

function fieldHTML(f,data,setName,pickName){
  const val=data[f.id];
  const star=f.req?' <span class="req">*</span>':'';
  const hint=f.hint?' <span class="hint">— '+esc(f.hint)+'</span>':'';
  let inner='';
  if(f.type==='chips'){
    const sel=f.multi?(Array.isArray(val)?val:[]):val;
    inner='<div class="chips" data-field="'+f.id+'">'+f.opts.map(o=>{
      const on=f.multi?sel.includes(o):sel===o;
      return '<div class="chip '+(on?'on':'')+'" onclick="'+pickName+'(\''+f.id+'\',\''+esc(o)+'\','+(f.multi?1:0)+')">'+esc(o)+'</div>';
    }).join('')+'</div>';
  } else if(f.type==='textarea'){
    inner='<textarea oninput="'+setName+'(\''+f.id+'\',this.value)">'+esc(val||'')+'</textarea>';
  } else {
    const im=f.type==='number'?'inputmode="numeric"':(f.type==='tel'?'inputmode="tel"':'');
    inner='<input type="'+f.type+'" '+im+' value="'+esc(val||'')+'" oninput="'+setName+'(\''+f.id+'\',this.value)">';
  }
  return '<div class="field" id="fld_'+f.id+'"><label>'+esc(f.label)+star+hint+'</label>'+inner+'<div class="errmsg">Required</div></div>';
}

/* ============================== INTERACTION ============================== */
function getSystem(id){ return (current.data.systems||[]).find(s=>s.id===id); }
function systemsStepIdx(){ return PROP_STEPS.findIndex(s=>s.id==='systems'); }
function setVal(id,v){ current.data[id]=v; touch(); }
function pickChip(id,val,multi){ pick(current.data,id,val,multi); touch(); renderStep(); }
function setSysVal(id,v){ const s=getSystem(editingSysId); if(s){ s[id]=v; touch(); } }
function pickSysChip(id,val,multi){ const s=getSystem(editingSysId); if(!s)return; pick(s,id,val,multi); touch(); renderSystemEditor(); }
function pick(obj,id,val,multi){
  if(multi){ const arr=Array.isArray(obj[id])?obj[id]:[]; const i=arr.indexOf(val); if(i>=0)arr.splice(i,1); else arr.push(val); obj[id]=arr; }
  else obj[id]=obj[id]===val?'':val;
}
let saveTimer=null;
function touch(){ current.updated=Date.now(); clearTimeout(saveTimer); saveTimer=setTimeout(persistCurrent,500); }
async function persistCurrent(){ const i=surveys.findIndex(s=>s.id===current.id); if(i>=0)surveys[i]=current; else surveys.push(current);
  await saveSurveys(); $('#hdrRight').textContent=mem?'local':'saved'; }

function validateStep(step){ if(step.custom)return true; return step.fields.filter(f=>f.req).every(f=>{ const v=current.data[f.id]; return v&&(!Array.isArray(v)||v.length); }); }
function markErrors(step){ if(step.custom)return; step.fields.forEach(f=>{ if(!f.req)return; const v=current.data[f.id]; const ok=v&&(!Array.isArray(v)||v.length);
  const el=document.getElementById('fld_'+f.id); if(el)el.classList.toggle('invalid',!ok); }); }

function goNext(){
  const step=PROP_STEPS[stepIdx];
  if(step.custom&&step.id==='systems'){
    const sys=current.data.systems||[];
    if(!sys.length){ toast('Add at least one system'); return; }
    const bad=sys.find(s=>!(s.zone&&s.sysType&&s.eqYear));
    if(bad){ toast('Finish each system (zone, type, age)'); return; }
  } else if(!validateStep(step)){ showErrors=true; markErrors(step); toast('Fill required fields'); return; }
  showErrors=false; persistCurrent();
  if(stepIdx<PROP_STEPS.length-1){ stepIdx++; renderStep(); }
  else { route='results'; renderResults(); }
}
function goBack(){ showErrors=false;
  if(stepIdx===0){ persistCurrent(); route='home'; renderHome(); }
  else { stepIdx--; renderStep(); } }
function renderNav(){ $('#nav').style.display='block'; const last=stepIdx===PROP_STEPS.length-1;
  $('#navInner').innerHTML='<button class="btn ghost back" onclick="goBack()">'+(stepIdx===0?'Exit':'Back')+'</button>'+
    '<button class="btn accent" onclick="goNext()">'+(last?'Review →':'Next →')+'</button>'; }

function addSystem(){ const n=(current.data.systems||[]).length;
  const label=n===0?'Main floor':(n===1?'Upstairs':'System '+(n+1));
  const s=newSystem(label); current.data.systems=current.data.systems||[]; current.data.systems.push(s);
  editingSysId=s.id; touch(); renderSystemEditor(); }
function editSystem(id){ editingSysId=id; showErrors=false; renderSystemEditor(); }
function deleteSystem(id){ current.data.systems=(current.data.systems||[]).filter(s=>s.id!==id); delete apiImages[id]; touch(); renderSystemsList(); }
function doneSystem(){ editingSysId=null; showErrors=false; stepIdx=systemsStepIdx(); route='survey'; persistCurrent(); renderSystemsList(); }

function editFromResults(){ route='survey'; stepIdx=0; renderStep(); }
function finishSurvey(){ current.done=true; persistCurrent(); toast('Survey saved'); route='home'; renderHome(); }
function startNew(){ current=newSurvey(); apiImages={}; stepIdx=0; route='survey'; showErrors=false; renderStep(); }
function openSurvey(id){ current=surveys.find(s=>s.id===id); if(!current)return; apiImages={}; stepIdx=0; showErrors=false;
  ['_propStatus','_rebStatus'].forEach(k=>{ if(current.data[k]==='loading')current.data[k]=''; });
  if(current.done){ route='results'; renderResults(); } else { route='survey'; renderStep(); } }

function copySummary(){
  const d=current.data; const systems=d.systems||[];
  const lines=['FIELD ENGINEER — JOB SUMMARY','Customer: '+(d.name||'')+'   '+(d.phone||''),'Address: '+fullAddress(d),
    'Home: '+(d.sqft||'?')+' sq ft'+(d.year?', built '+d.year:''),''];
  systems.forEach((s,i)=>{ const {set,est}=buildSystemFlags(s,d,systems.length);
    lines.push('SYSTEM '+(i+1)+': '+(s.zone||''));
    lines.push('  '+(s.sysType||'?')+' / '+(s.fuel||'?')+' / '+(s.eqYear||'?')+' yrs / cond '+(s.condition||'?'));
    if(s.brand||s.model)lines.push('  '+(s.brand||'')+' '+(s.model||'')+(s.serial?'  SN '+s.serial:''));
    if(est.cool)lines.push('  ~'+est.cool+' ton cooling (preliminary)');
    if(est.heat)lines.push('  ~'+(est.heat.low/1000)+'–'+(est.heat.high/1000)+'k BTU heating (preliminary)');
    lines.push('');
  });
  lines.push('Whole-home flags:');
  buildPropertyFlags(d,systems).forEach(f=>lines.push('  - '+f.t));
  const txt=lines.join('\n');
  if(navigator.clipboard)navigator.clipboard.writeText(txt).then(()=>toast('Summary copied')).catch(()=>toast('Copy failed'));
  else toast('Clipboard unavailable');
}

function afterComplaint(){ const c=currentCall; if(!c.complaint.reported||!c.complaint.confirmed){ toast('Fill both fields'); return; }
  if(!c.components.length){ const e=TECH_EQUIP.find(x=>x.key===c._eqKey); (e?e.components:[]).forEach(n=>c.components.push({id:'K'+Math.random().toString(36).slice(2,7),name:n,photos:[]})); }
  saveTechCall(); renderComponents(); }

function renderComponents(){
  $('#nav').style.display='block'; const c=currentCall;
  const rows=c.components.map(comp=>{ const done=comp.brand||comp.model||comp.serial||(comp.photos&&comp.photos.length);
    const meta=[comp.brand,comp.model,comp.serial?'SN '+comp.serial:''].filter(Boolean).join(' · ')||'tap to capture';
    return '<div class="comp '+(done?'done':'')+'" onclick="editComp(\''+comp.id+'\')"><div><div class="nm">'+esc(comp.name)+'</div><div class="mt">'+esc(meta)+'</div></div><div class="cv">›</div></div>';
  }).join('');
  view().innerHTML='<div class="stepcap">'+esc(c.equipment)+' · Step 3</div><div class="steph">Capture the system</div>'+
    '<p style="color:var(--muted);font-size:12px;margin:-6px 2px 12px">Photograph each component\u2019s nameplate. The AI reads the make/model/serial.</p>'+
    rows+
    '<div class="comp" style="border-left-color:var(--cool);cursor:pointer" onclick="addExtra()"><div><div class="nm" style="color:var(--cool-dk)">+ Other component</div><div class="mt">zoning, humidifier, secondary unit…</div></div></div>';
  $('#navInner').innerHTML='<button class="btn ghost back" onclick="renderComplaint()">Back</button><button class="btn accent" onclick="afterComponents()">Start diagnosis →</button>';
  window.scrollTo(0,0);
}
function addExtra(){ const c=currentCall; const comp={id:'K'+Math.random().toString(36).slice(2,7),name:'Other component',photos:[],extra:true}; c.components.push(comp); editComp(comp.id); }
function afterComponents(){ saveTechCall(); enterDiagnosis(); }

function getComp(id){ return currentCall.components.find(c=>c.id===id); }
function renderCompEdit(id){ currentCall._editComp=id; const comp=getComp(id); if(!comp)return renderComponents();
  $('#nav').style.display='block';
  const photos=(comp.photos||[]).map((p,i)=>'<div class="thumbx"><img class="thumb" src="'+p+'"><button onclick="rmCompPhoto(\''+id+'\','+i+')">×</button></div>').join('');
  const has=(techApiImages['c:'+id]||[]).length>0;
  let ai='';
  if(comp._aiStatus==='analyzing')ai='<div class="ai-panel"><div class="ah"><span class="spinner"></span> Reading nameplate…</div></div>';
  else if(comp._aiStatus==='error')ai='<div class="ai-panel" style="border-color:var(--accent);background:#fdf2ef"><div class="ah" style="color:var(--accent-dk)">Couldn\u2019t read it</div><div class="reason">Enter manually. ('+esc(comp._aiErr||'')+')</div></div>';
  else if(comp._ai){ const a=comp._ai; ai='<div class="ai-panel"><div class="ah">AI read · verify<span class="conf '+(a.confidence||'low')+'">'+esc(a.confidence||'')+'</span></div><div class="reason">'+(a.dateReasoning?'<b>Date:</b> '+esc(a.dateReasoning):esc(a.readNotes||''))+'</div></div>'; }
  view().innerHTML='<div class="stepcap">'+esc(currentCall.equipment)+' · component</div><div class="steph">'+esc(comp.name)+'</div>'+
    (comp.extra?'<div class="field"><label>Component name</label><input type="text" value="'+esc(comp.name)+'" oninput="getComp(\''+id+'\').name=this.value"></div>':'')+
    '<div class="syshdr">Nameplate Photos</div><div class="photo-row">'+photos+'<label class="addphoto">+<input type="file" accept="image/*" multiple onchange="compPhotos(\''+id+'\',this.files)"></label></div>'+
    '<button class="btn cool sm" style="width:100%" onclick="readComp(\''+id+'\')" '+(has?'':'disabled')+'>'+(has?'⌁ Read with AI':'Add a photo to enable AI')+'</button>'+ai+
    '<div class="syshdr">Details</div>'+
    '<div class="field"><label>Brand</label><input type="text" value="'+esc(comp.brand||'')+'" oninput="getComp(\''+id+'\').brand=this.value"></div>'+
    '<div class="field"><label>Model #</label><input type="text" value="'+esc(comp.model||'')+'" oninput="getComp(\''+id+'\').model=this.value"></div>'+
    '<div class="field"><label>Serial #</label><input type="text" value="'+esc(comp.serial||'')+'" oninput="getComp(\''+id+'\').serial=this.value"></div>';
  $('#navInner').innerHTML='<button class="btn ghost back" onclick="doneComp()">‹ Components</button><button class="btn accent" onclick="doneComp()">Save</button>';
  window.scrollTo(0,0);
}
function editComp(id){ renderCompEdit(id); }
function doneComp(){ saveTechCall(); renderComponents(); }
async function compPhotos(id,files){ const comp=getComp(id); await techPhotos('c:'+id,comp.photos,files,()=>renderCompEdit(id)); }
function rmCompPhoto(id,i){ const comp=getComp(id); comp.photos.splice(i,1); if(techApiImages['c:'+id])techApiImages['c:'+id].splice(i,1); saveTechCall(); renderCompEdit(id); }
async function readComp(id){ const comp=getComp(id); const imgs=techApiImages['c:'+id]||[]; if(!imgs.length){ toast('Add a photo first'); return; }
  comp._aiStatus='analyzing'; renderCompEdit(id);
  try{ const p=await callBackend('nameplate',{images:imgs.map(x=>({base64:x.base64,mediaType:x.mediaType}))});
    if(p.brand&&!comp.brand)comp.brand=p.brand; if(p.model&&!comp.model)comp.model=p.model; if(p.serial&&!comp.serial)comp.serial=p.serial;
    comp._ai=p; comp._aiStatus='done';
  }catch(e){ comp._aiStatus='error'; comp._aiErr=String((e&&e.message)||e); }
  saveTechCall(); renderCompEdit(id);
}

/* shared multi-photo helper for tech */
async function techPhotos(bucket,arr,fileList,rerender){
  const files=Array.from(fileList).slice(0,6);
  for(const f of files){ if(!f.type.startsWith('image/'))continue;
    try{ const th=await resizeImage(f,200,0.55); const big=await resizeImage(f,1100,0.7);
      arr.push(th.dataUrl); techApiImages[bucket]=techApiImages[bucket]||[]; techApiImages[bucket].push({base64:big.base64,mediaType:big.mediaType});
    }catch(e){ toast('Photo error'); }
  }
  saveTechCall(); rerender();
}

/* ============================== TECH: DIAGNOSTIC LOOP ============================== */
function diagPayload(extraImages){
  const c=currentCall;
  return { action:'diagnose', equipment:c.equipment, jobType:c.jobType,
    complaint:c.complaint,
    components:c.components.map(x=>({name:x.name,brand:x.brand||'',model:x.model||'',serial:x.serial||''})),
    trail:c.trail.map(t=>({step:t.title,value:t.value,unit:t.unit||''})),
    tech:{level:techProfile.level,epaType:techProfile.epaType,gates:techProfile.gates,conditionalOverride:techProfile.conditionalOverride},
    images:extraImages||[] };
}
function enforce(res){
  const c=currentCall;
  if(res.kind==='step'&&res.step&&res.step.requiresGate&&!hasGate(res.step.requiresGate)){
    c.escalation={reason:'Next step requires '+res.step.requiresGate+': '+res.step.title,at:res.step.title}; res.kind='escalate';
  }
  if(res.kind==='diagnosis'&&res.repair&&res.repair.requiresGate&&!hasGate(res.repair.requiresGate)) res.repair._blocked=true;
  if(res.kind==='hardstop'&&res.hardstop) res.hardstop._canClear=(res.hardstop.type==='conditional'&&canClearStop(res.hardstop));
  return res;
}
async function enterDiagnosis(){
  const c=currentCall; c._busy=true; renderDiagnose();
  try{ const r=await callBackend('diagnose',diagPayload()); c._current=enforce(r); }
  catch(e){ c._current={kind:'error',message:String((e&&e.message)||e)}; }
  c._busy=false; saveTechCall(); renderDiagnose();
}
function renderDiagnose(){
  $('#nav').style.display='block'; const c=currentCall; const cur=c._current;
  let trailHTML=''; if(c.trail.length) trailHTML='<div class="trail">'+c.trail.map(t=>'<div class="trailitem"><span>'+esc(t.title)+'</span><span class="v">'+esc(t.value)+(t.unit?' '+esc(t.unit):'')+'</span></div>').join('')+'</div>';
  let body='';
  if(c._busy){ body='<div class="stepcard"><div class="st"><span class="spinner"></span> Thinking through the next step…</div></div>'; }
  else if(!cur){ body='<div class="stepcard"><div class="how">Starting diagnosis…</div></div>'; }
  else if(cur.kind==='error'){ body='<div class="stopcard"><div class="sh">Connection issue</div><div class="reason">'+esc(cur.message)+'</div><div class="act">Check the backend, then retry.</div></div><button class="btn accent" onclick="enterDiagnosis()">Retry</button>'; }
  else if(cur.kind==='step'){ const s=cur.step; if(!c._stepDraft)c._stepDraft={value:'',note:'',photos:[]};
    body='<button class="danger-btn" onclick="manualDanger()">⚠ I see something dangerous — stop</button>'+
      '<div class="stepcard"><div class="st">'+esc(s.title)+'</div><div class="how">'+esc(s.how||'')+'</div>'+
      (s.inlineCaution?'<div class="caution"><b>Caution:</b> '+esc(s.inlineCaution)+'</div>':'')+
      '<div class="field"><label>Measured value'+(s.expects&&s.expects.unit?' ('+esc(s.expects.unit)+')':'')+'</label><input type="text" value="'+esc(c._stepDraft.value)+'" placeholder="Enter what you read" oninput="currentCall._stepDraft.value=this.value"></div>'+
      '<div class="field"><label>Photos <span class="hint">— optional, for the record &amp; support</span></label><div class="photo-row">'+
        (c._stepDraft.photos||[]).map((p,i)=>'<div class="thumbx"><img class="thumb" src="'+p+'"><button onclick="rmStepPhoto('+i+')">×</button></div>').join('')+
        '<label class="addphoto">+<input type="file" accept="image/*" multiple onchange="stepPhotos(this.files)"></label></div></div>'+
      '<div class="field"><label>Note <span class="hint">— optional</span></label><input type="text" value="'+esc(c._stepDraft.note)+'" oninput="currentCall._stepDraft.note=this.value"></div>'+
      '<button class="btn accent" style="width:100%" onclick="submitReading()">Submit reading →</button></div>';
  }
  else if(cur.kind==='hardstop'){ const h=cur.hardstop;
    body='<div class="stopcard"><div class="sh">⛔ Stop</div><div class="reason">'+esc(h.message||'')+'</div><div class="act">'+esc(h.action||'Make the area safe and escalate.')+'</div></div>';
    if(h._canClear) body+='<div class="note">You hold the credentials to proceed past this conditional stop. Proceeding is logged to the job.</div><button class="btn accent" onclick="ackStop()">Acknowledge &amp; proceed</button><button class="btn ghost sm" style="width:100%;margin-top:8px" onclick="escalateCall(\'Hard stop\')">Escalate instead</button>';
    else body+='<button class="btn accent" onclick="escalateCall(\'Hard stop: '+esc((h.message||'').slice(0,40))+'\')">Log &amp; escalate</button>';
  }
  else if(cur.kind==='escalate'){ body='<div class="stopcard"><div class="sh">Beyond your scope</div><div class="reason">'+esc(c.escalation?c.escalation.reason:'Requires a credential you don\u2019t hold.')+'</div><div class="act">Everything you confirmed is saved. Hand off to a qualified tech.</div></div><button class="btn accent" onclick="escalateCall(currentCall.escalation&&currentCall.escalation.reason)">Log &amp; escalate</button>'; }
  else if(cur.kind==='diagnosis'){ const r=cur.repair||{};
    body='<div class="diagcard"><div class="dh">Likely diagnosis</div><div class="dx">'+esc(cur.diagnosis||'')+'</div></div>';
    if(r._blocked){ body+='<div class="stopcard"><div class="sh">Repair gated</div><div class="reason">This repair requires <b>'+esc(r.requiresGate)+'</b>, which isn\u2019t on your profile.</div><div class="act">Diagnosis is saved — escalate for the repair.</div></div><button class="btn accent" onclick="escalateCall(\'Repair requires '+esc(r.requiresGate)+'\')">Log &amp; escalate</button>'; }
    else { body+='<div class="syshdr">Guided repair</div>'+((r.steps||[]).map((st,i)=>'<div class="trailitem"><span><b>'+(i+1)+'.</b> '+esc(st)+'</span></div>').join('')||'<div class="note">No repair steps returned.</div>')+
      (r.inlineCaution?'<div class="caution"><b>Caution:</b> '+esc(r.inlineCaution)+'</div>':'')+
      '<button class="btn accent" style="width:100%;margin-top:10px" onclick="renderVerify()">Repair done — verify →</button>'; }
  }
  view().innerHTML='<div class="stepcap">'+esc(c.equipment)+' · '+esc(c.complaint.reported||'')+' · diagnosis</div>'+trailHTML+body;
  $('#navInner').innerHTML='<button class="btn ghost back" onclick="renderComponents()">‹ System</button><button class="btn ghost" onclick="exitCall()">Save &amp; exit</button>';
  window.scrollTo(0,0);
}
async function stepPhotos(files){ await techPhotos('step:draft',currentCall._stepDraft.photos,files,()=>renderDiagnose()); }
function rmStepPhoto(i){ currentCall._stepDraft.photos.splice(i,1); if(techApiImages['step:draft'])techApiImages['step:draft'].splice(i,1); renderDiagnose(); }
async function submitReading(){
  const c=currentCall; const d=c._stepDraft; const s=c._current.step;
  if(!d.value){ toast('Enter the measured value'); return; }
  c.trail.push({title:s.title,value:d.value,unit:(s.expects&&s.expects.unit)||'',note:d.note,photos:d.photos.slice(),time:Date.now()});
  const imgs=(techApiImages['step:draft']||[]).map(x=>({base64:x.base64,mediaType:x.mediaType}));
  techApiImages['step:draft']=[]; c._stepDraft=null; c._busy=true; saveTechCall(); renderDiagnose();
  try{ const r=await callBackend('diagnose',diagPayload(imgs)); c._current=enforce(r); }
  catch(e){ c._current={kind:'error',message:String((e&&e.message)||e)}; }
  c._busy=false; saveTechCall(); renderDiagnose();
}
function manualDanger(){ currentCall._current={kind:'hardstop',hardstop:{type:'universal',message:'You flagged a potential danger.',action:'Stop work, make the area safe (shut off power/gas as appropriate), and escalate to a supervisor.'}}; saveTechCall(); renderDiagnose(); }
function ackStop(){ const c=currentCall; c.acks=c.acks||[]; c.acks.push({item:c._current.hardstop.message,by:techProfile.techId,level:techProfile.level,time:Date.now()});
  toast('Acknowledged & logged'); c._current=null; c.trail.push({title:'Override acknowledged',value:'proceeded',unit:''}); enterDiagnosis(); }
function escalateCall(reason){ const c=currentCall; c.escalation=c.escalation||{reason:reason||'Escalated'}; c.status='escalated'; saveTechCall(); renderDone(); }

function renderVerify(){
  $('#nav').style.display='block'; const c=currentCall; if(!c.verify)c.verify={result:'',reading:'',photos:[]};
  view().innerHTML='<div class="stepcap">'+esc(c.equipment)+' · verify</div><div class="steph">Confirm the fix</div>'+
    '<div class="field"><label>Re-check original complaint — result *</label><input type="text" value="'+esc(c.verify.result)+'" placeholder="e.g. Heat confirmed at registers" oninput="currentCall.verify.result=this.value"></div>'+
    '<div class="field"><label>Confirming reading</label><input type="text" value="'+esc(c.verify.reading)+'" placeholder="e.g. 120°F supply" oninput="currentCall.verify.reading=this.value"></div>'+
    '<div class="field"><label>Photos</label><div class="photo-row">'+(c.verify.photos||[]).map((p,i)=>'<div class="thumbx"><img class="thumb" src="'+p+'"><button onclick="rmVerPhoto('+i+')">×</button></div>').join('')+'<label class="addphoto">+<input type="file" accept="image/*" multiple onchange="verPhotos(this.files)"></label></div></div>';
  $('#navInner').innerHTML='<button class="btn ghost back" onclick="renderDiagnose()">Back</button><button class="btn accent" onclick="closeCall()">Close job</button>';
  window.scrollTo(0,0);
}
async function verPhotos(files){ await techPhotos('verify',currentCall.verify.photos,files,()=>renderVerify()); }
function rmVerPhoto(i){ currentCall.verify.photos.splice(i,1); renderVerify(); }
function closeCall(){ const c=currentCall; if(!c.verify.result){ toast('Note the verification result'); return; } if(c._current&&c._current.diagnosis)c.diagnosis=c._current.diagnosis; c.status='closed'; saveTechCall(); renderDone(); }
function exitCall(){ saveTechCall(); renderTechHome(); }

function renderDone(){
  $('#nav').style.display='block'; const c=currentCall;
  const stampGates=[...new Set(c.trail.filter(()=>false))]; // placeholder
  const closed=c.status==='closed';
  view().innerHTML='<div class="stepcap">'+esc(c.equipment)+' · '+(closed?'closed':'escalated')+'</div>'+
    '<div class="steph">'+(closed?'Job complete':'Escalated')+'</div>'+
    '<div class="'+(closed?'diagcard':'stopcard')+'"><div class="'+(closed?'dh':'sh')+'">'+(closed?'Diagnosis':'Reason')+'</div><div class="'+(closed?'dx':'reason')+'">'+esc(closed?(c.diagnosis|| (c._current&&c._current.diagnosis)||'See trail'):(c.escalation&&c.escalation.reason||''))+'</div></div>'+
    '<div class="syshdr">Job record</div>'+
    '<div class="trailitem"><span>Tech</span><span class="v">'+esc(c.techId)+'</span></div>'+
    '<div class="trailitem"><span>EPA cert</span><span class="v">'+esc(techProfile.epaCert||'—')+'</span></div>'+
    '<div class="trailitem"><span>Complaint</span><span class="v">'+esc(c.complaint.reported)+' / '+esc(c.complaint.confirmed)+'</span></div>'+
    (c.verify&&c.verify.result?'<div class="trailitem"><span>Verified</span><span class="v">'+esc(c.verify.result)+'</span></div>':'')+
    '<button class="btn ghost sm" style="width:100%;margin-top:12px" onclick="copyCall()">Copy job summary</button>';
  $('#navInner').innerHTML='<button class="btn accent" onclick="renderTechHome()">Done</button>';
  window.scrollTo(0,0);
}
function copyCall(){ const c=currentCall;
  const lines=['FIELD ENGINEER — SERVICE CALL','Tech: '+c.techId+'  EPA#: '+(techProfile.epaCert||'—'),
    'Equipment: '+c.equipment,'Reported: '+c.complaint.reported,'On arrival: '+c.complaint.confirmed,'',
    'Components:'].concat(c.components.map(x=>'  - '+x.name+': '+[x.brand,x.model,x.serial].filter(Boolean).join(' ')))
    .concat(['','Diagnostic readings:']).concat(c.trail.map(t=>'  - '+t.title+': '+t.value+(t.unit?' '+t.unit:'')))
    .concat(['',c.status==='closed'?('Diagnosis: '+(c.diagnosis||(c._current&&c._current.diagnosis)||'')):('ESCALATED: '+(c.escalation&&c.escalation.reason||''))]);
  if(c.verify&&c.verify.result)lines.push('Verified: '+c.verify.result+(c.verify.reading?' ('+c.verify.reading+')':''));
  const txt=lines.join('\n');
  if(navigator.clipboard)navigator.clipboard.writeText(txt).then(()=>toast('Copied')).catch(()=>toast('Copy failed')); else toast('Clipboard unavailable');
}

/* ============================== BOOT ============================== */
(async function(){ await loadSurveys(); await loadBackend(); await loadTech(); renderModeSelect(); })();
</script>
